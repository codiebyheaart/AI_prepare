spring:
  application:
    name: finsight-ai

  datasource:
    url: jdbc:postgresql://localhost:5432/finsight
    username: finsight
    password: finsight123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          min-idle: 2

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-demo-key}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
        index-type: hnsw
        distance-type: cosine_distance
        schema-name: public
        table-name: vector_store

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:FinSightAISecretKey2026VeryLongSecretKeyForHS256Algorithm!}
    expiration: 86400000  # 24 hours in ms
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  ai:
    max-context-tokens: 3000
    max-response-tokens: 1500
    cache-ttl-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

logging:
  level:
    com.finsight: DEBUG
    org.springframework.ai: INFO
    org.springframework.security: WARN
